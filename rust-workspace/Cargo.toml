[workspace]
members = [
  "ast-core",
  "md-parser",
  "ast-renderer",
  "wasm-engine",
  "ast-gen",
  "ms-toc-extractor",
  "image-compressor",
  "ms-local-draft",
  "ms-storage",
  "ms-kb-exporter",
]

resolver = "2"

[workspace.dependencies]
serde = {version = "1.0", features = ["derive"]}
serde_json = "1.0"
thiserror = "1.0"
tokio = {version = "1", features = ["rt", "sync", "macros", "io-util"]}
