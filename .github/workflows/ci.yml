name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 1: Lint & Type Check ─────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-workspace/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-workspace/Cargo.lock') }}

      - name: Install frontend deps
        run: cd frontend-workspace && pnpm install --frozen-lockfile

      - name: Rust fmt
        run: cd rust-workspace && cargo fmt --check

      - name: Rust clippy
        run: cd rust-workspace && cargo clippy -- -D warnings

      - name: Go vet
        run: cd go-server && go vet ./...

      - name: Frontend type check
        run: cd frontend-workspace && npx vue-tsc --noEmit --project apps/admin-tauri/tsconfig.json

  # ── Stage 2: Test ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: memory_stream_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-workspace/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-workspace/Cargo.lock') }}

      - name: Install frontend deps
        run: cd frontend-workspace && pnpm install --frozen-lockfile

      - name: Rust test
        run: cd rust-workspace && cargo test

      - name: Go test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: root
          DB_NAME: memory_stream_test
          JWT_SECRET: test-secret-that-is-at-least-32-characters-long
        run: cd go-server && go test -race -count=1 ./...

      - name: Frontend test
        run: cd frontend-workspace && pnpm test

  # ── Stage 3: Build ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-workspace/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-workspace/Cargo.lock') }}

      - name: Install frontend deps
        run: cd frontend-workspace && pnpm install --frozen-lockfile

      - name: Build Rust (workspace libraries)
        run: cd rust-workspace && cargo build --release

      - name: Build Go
        run: cd go-server && go build -o bin/server ./cmd/api

      - name: Build frontend
        run: cd frontend-workspace && pnpm build
