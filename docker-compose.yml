# 🐳 Memory Stream — 本地开发基础设施
#
# 使用方法：
#   docker compose up -d           # 启动所有服务
#   docker compose up -d minio     # 仅启动 MinIO
#   docker compose down            # 停止并删除容器
#   docker compose logs -f minio   # 查看 MinIO 日志
#
# 服务说明：
#   - MinIO S3 API:    http://127.0.0.1:9000
#   - MinIO Console:   http://127.0.0.1:9001  (admin / adminpassword)
#   - PostgreSQL:      127.0.0.1:5432         (postgres / root)
#   - Redis:           127.0.0.1:6379

services:
  # ─── MinIO (S3 兼容对象存储) ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: memory-stream-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API 端点
      - "9001:9001" # Web 控制台
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── MinIO 初始化（创建 bucket） ──────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: memory-stream-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin adminpassword;
      mc mb --ignore-existing local/memory-stream;
      mc anonymous set public local/memory-stream;
      echo '✅ Bucket memory-stream created (public read)';
      "

  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: memory-stream-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: memory_stream
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: memory-stream-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  minio_data:
  pg_data:
  redis_data:
